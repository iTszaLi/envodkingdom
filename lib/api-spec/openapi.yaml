openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ENVOD KINGDOM SHIPPING SERVICES LLC API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tracking
    description: Shipment tracking
  - name: services
    description: Logistics services
  - name: testimonials
    description: Client testimonials
  - name: faqs
    description: Frequently asked questions
  - name: team
    description: Team members
  - name: articles
    description: Blog articles
  - name: clients
    description: Client logos
  - name: inquiries
    description: Contact & quote inquiries
  - name: settings
    description: CMS settings
  - name: stats
    description: Company statistics
  - name: auth
    description: Admin authentication
  - name: hero-videos
    description: Hero video section management
  - name: gallery
    description: Operations gallery

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated

  # ── STATS (wow endpoint) ───────────────────────────────────────────────────
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get company statistics
      responses:
        "200":
          description: Company statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyStats"

  # ── SHIPMENT TRACKING ─────────────────────────────────────────────────────
  /shipments:
    get:
      operationId: listShipments
      tags: [tracking]
      summary: List all shipments (admin)
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of shipments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipmentList"
    post:
      operationId: createShipment
      tags: [tracking]
      summary: Create a shipment (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /shipments/track/{trackingNumber}:
    get:
      operationId: trackShipment
      tags: [tracking]
      summary: Track a shipment by tracking number (public)
      parameters:
        - in: path
          name: trackingNumber
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment details with timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipmentTracking"
        "404":
          description: Not found

  /shipments/{id}:
    get:
      operationId: getShipment
      tags: [tracking]
      summary: Get shipment by ID (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Not found
    put:
      operationId: updateShipment
      tags: [tracking]
      summary: Update a shipment (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
    delete:
      operationId: deleteShipment
      tags: [tracking]
      summary: Delete a shipment (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /shipments/{id}/status:
    post:
      operationId: addShipmentStatus
      tags: [tracking]
      summary: Add status update to shipment (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateInput"
      responses:
        "201":
          description: Status added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUpdate"

  # ── SERVICES ──────────────────────────────────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    put:
      operationId: updateService
      tags: [services]
      summary: Update service (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete service (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── TESTIMONIALS ──────────────────────────────────────────────────────────
  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create testimonial (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    put:
      operationId: updateTestimonial
      tags: [testimonials]
      summary: Update testimonial (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete testimonial (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── FAQS ──────────────────────────────────────────────────────────────────
  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs
      parameters:
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Create FAQ (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /faqs/{id}:
    put:
      operationId: updateFaq
      tags: [faqs]
      summary: Update FAQ (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete FAQ (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── TEAM ──────────────────────────────────────────────────────────────────
  /team:
    get:
      operationId: listTeam
      tags: [team]
      summary: List team members
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create team member (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    put:
      operationId: updateTeamMember
      tags: [team]
      summary: Update team member (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete team member (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ARTICLES (BLOG) ───────────────────────────────────────────────────────
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: published
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Paginated articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleList"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create article (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found

  /articles/{id}/publish:
    patch:
      operationId: publishArticle
      tags: [articles]
      summary: Publish or unpublish article (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticlePublish"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}:
    put:
      operationId: updateArticle
      tags: [articles]
      summary: Update article (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete article (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── GALLERY ───────────────────────────────────────────────────────────────
  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery items
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: published
          schema:
            type: boolean
      responses:
        "200":
          description: Gallery items ordered for display
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"

  /gallery/reorder:
    post:
      operationId: reorderGallery
      tags: [gallery]
      summary: Reorder gallery items (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryReorder"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"

  /gallery/{id}:
    get:
      operationId: getGalleryItem
      tags: [gallery]
      summary: Get a gallery item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gallery item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"
        "404":
          description: Not found
    patch:
      operationId: updateGalleryItem
      tags: [gallery]
      summary: Update gallery item metadata (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"
    delete:
      operationId: deleteGalleryItem
      tags: [gallery]
      summary: Delete gallery item (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CLIENTS ───────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List client logos
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update client (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete client (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── INQUIRIES ─────────────────────────────────────────────────────────────
  /inquiries:
    get:
      operationId: listInquiries
      tags: [inquiries]
      summary: List inquiries (admin)
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Paginated inquiries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryList"
    post:
      operationId: submitInquiry
      tags: [inquiries]
      summary: Submit contact / quote request (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  /inquiries/{id}:
    put:
      operationId: updateInquiry
      tags: [inquiries]
      summary: Update inquiry status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
    delete:
      operationId: deleteInquiry
      tags: [inquiries]
      summary: Delete inquiry (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── HERO VIDEOS ───────────────────────────────────────────────────────────
  /hero-videos:
    get:
      operationId: listHeroVideos
      tags: [hero-videos]
      summary: Get hero video section status (admin)
      responses:
        "200":
          description: Hero video sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeroVideoSection"

  /hero-videos/{section}:
    post:
      operationId: uploadHeroVideo
      tags: [hero-videos]
      summary: Upload a new animated WebP for a hero section (admin)
      parameters:
        - in: path
          name: section
          required: true
          schema:
            type: string
            enum: [crane, air, warehouse]
      responses:
        "200":
          description: Updated section info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroVideoSection"
        "400":
          description: Invalid section or missing file
        "500":
          description: Frame extraction failed

  # ── SETTINGS ──────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get CMS settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update CMS settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH ──────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [admin]
      properties:
        admin:
          $ref: "#/components/schemas/AdminUser"

    AdminUser:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string

    # ── STATS ─────────────────────────────────────────────────────────────
    CompanyStats:
      type: object
      required: [yearsExperience, shipmentsDelivered, corporateClients, globalPartners, onTimeDeliveryRate, customsClearanceHours]
      properties:
        yearsExperience:
          type: integer
        shipmentsDelivered:
          type: integer
        corporateClients:
          type: integer
        globalPartners:
          type: integer
        onTimeDeliveryRate:
          type: number
        customsClearanceHours:
          type: integer
        activeShipments:
          type: integer
        pendingInquiries:
          type: integer

    # ── SHIPMENT TRACKING ─────────────────────────────────────────────────
    Shipment:
      type: object
      required: [id, trackingNumber, status, origin, destination, createdAt]
      properties:
        id:
          type: integer
        trackingNumber:
          type: string
        referenceNumber:
          type: ["string", "null"]
        invoiceNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [booking_confirmed, cargo_received, documentation_complete, customs_clearance, port_processing, in_transit, warehouse_arrival, out_for_delivery, delivered]
        origin:
          type: string
        destination:
          type: string
        serviceType:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        weight:
          type: ["number", "null"]
        pieces:
          type: ["integer", "null"]
        estimatedDelivery:
          type: ["string", "null"]
        actualDelivery:
          type: ["string", "null"]
        shipperName:
          type: ["string", "null"]
        consigneeName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ShipmentList:
      type: object
      required: [shipments, total, page, limit]
      properties:
        shipments:
          type: array
          items:
            $ref: "#/components/schemas/Shipment"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ShipmentTracking:
      type: object
      required: [shipment, timeline, progressPercent]
      properties:
        shipment:
          $ref: "#/components/schemas/Shipment"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/StatusUpdate"
