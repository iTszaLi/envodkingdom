kind = "web"
previewPath = "/"
title = "ENVOD KINGDOM SHIPPING SERVICES LLC"
version = "1.0.0"
id = "artifacts/envod-kingdom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25184

[services.development]
run = "pnpm --filter @workspace/envod-kingdom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/envod-kingdom", "run", "build" ]
publicDir = "artifacts/envod-kingdom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25184"
BASE_PATH = "/"
