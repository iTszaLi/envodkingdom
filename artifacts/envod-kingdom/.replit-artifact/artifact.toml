kind = "web"
previewPath = "/"
title = "ENVOD KINGDOM SHIPPING SERVICES LLC"
version = "1.0.0"
id = "artifacts/envod-kingdom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25184

[services.development]
run = "pnpm --filter @workspace/envod-kingdom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/envod-kingdom", "run", "build" ]
publicDir = "artifacts/envod-kingdom/dist/public"
serve = "static"

# Prerendered (SSG) content routes: clean URL -> directory index.html.
# Replit static serving does NOT auto-resolve /foo -> /foo/index.html, so each
# prerendered route needs an explicit rewrite. Physical files (assets, images,
# media, logos) are served directly via shadowing. Rules are processed in order,
# so these exact routes MUST precede the SPA catch-all below.
# NOTE: keep this list in sync with CONTENT_ROUTES in src/lib/seo-config.ts.

[[services.production.rewrites]]
from = "/services"
to = "/services/index.html"

[[services.production.rewrites]]
from = "/about"
to = "/about/index.html"

